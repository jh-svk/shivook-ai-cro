# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "0448bbb332c73ebe41f69192235e1bbc"
name = "Shivook AI CRO"
application_url = "https://shivook-ai-cro-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[webhooks.privacy_compliance]
customer_data_request_url = "/webhooks/customers/data_request"
customer_deletion_url     = "/webhooks/customers/redact"
shop_deletion_url         = "/webhooks/shop/redact"

# orders/paid webhook subscription is omitted here.
# It requires Shopify Protected Customer Data approval before it can be
# registered. Complete the review at:
#   https://shopify.dev/docs/apps/launch/protected-customer-data
# Then add back:
#   [[webhooks.subscriptions]]
#   topics = [ "orders/paid" ]
#   uri    = "/webhooks/orders_paid"

[app_proxy]
url     = "https://shivook-ai-cro-production.up.railway.app"
subpath = "cro"
prefix  = "apps"

[access_scopes]
scopes = "read_orders,read_products,write_pixels,read_customer_events"

[auth]
redirect_urls = [
  "https://shivook-ai-cro-production.up.railway.app/auth/callback",
  "https://shivook-ai-cro-production.up.railway.app/auth/shopify/callback",
  "https://shivook-ai-cro-production.up.railway.app/api/auth/callback",
]
